name: Publish to Artifact Registry

# v* タグ push (例: v0.2.0) で wheel + sdist をビルドし、
# klab-laser-process の Artifact Registry (Python repo: labvault-pypi) へ upload する。
#
# 使い方:
#   1. pyproject.toml の version を上げる
#   2. git tag v0.2.0 && git push origin v0.2.0
#   3. このワークフローが走り、AR に publish される
#
# Reader (pip install 側) には reader 権限を別途付与する。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "version tag (informational, ビルドは現在の pyproject.toml を使う)"
        required: false

env:
  PROJECT_ID: klab-laser-process
  REGION: asia-northeast1
  REPO: labvault-pypi

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}
          token_format: access_token

      - name: Verify tag matches pyproject.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJ_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PROJ_VERSION" ]; then
            echo "::error::tag version ($TAG_VERSION) != pyproject.toml version ($PROJ_VERSION)"
            exit 1
          fi
          echo "version OK: $TAG_VERSION"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload to Artifact Registry
        env:
          TWINE_USERNAME: oauth2accesstoken
          TWINE_PASSWORD: ${{ steps.auth.outputs.access_token }}
        run: |
          python -m pip install --upgrade twine
          twine upload \
            --repository-url "https://${REGION}-python.pkg.dev/${PROJECT_ID}/${REPO}/" \
            --skip-existing \
            dist/*
