name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - "platform/backend/**"
      - "src/**"
      - "pyproject.toml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  PROJECT_ID: klab-laser-process
  REGION: asia-northeast1
  REPO: labvault
  SERVICE: labvault-api
  IMAGE: asia-northeast1-docker.pkg.dev/klab-laser-process/labvault/api
  RUNTIME_SA: labvault-api@klab-laser-process.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation 用
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push
        run: |
          TAG=${GITHUB_SHA::8}
          docker buildx build --platform linux/amd64 \
            -f platform/backend/Dockerfile \
            -t ${{ env.IMAGE }}:$TAG \
            -t ${{ env.IMAGE }}:latest \
            --push .

      - name: Deploy to Cloud Run
        run: |
          TAG=${GITHUB_SHA::8}
          gcloud run deploy ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.IMAGE }}:$TAG \
            --service-account=${{ env.RUNTIME_SA }} \
            --port=8080 --memory=512Mi --cpu=1 \
            --min-instances=0 --max-instances=3 \
            --allow-unauthenticated \
            --set-env-vars=LABVAULT_TEAM=konishi-lab,LABVAULT_GCP_PROJECT=klab-laser-process,LABVAULT_FIRESTORE_DATABASE=labvault,LABVAULT_NEXTCLOUD_URL=https://arim.mdx.jp/nextcloud,LABVAULT_NEXTCLOUD_USER=arim00065,LABVAULT_NEXTCLOUD_GROUP_FOLDER=large/24UTARIM004,LABVAULT_AR_REPO=projects/klab-laser-process/locations/asia-northeast1/repositories/labvault-pypi \
            --quiet
